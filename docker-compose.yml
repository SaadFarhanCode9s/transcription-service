# ---------------------------------------------------------- #
# Persistent volumes
# ---------------------------------------------------------- #
volumes:
  uploads_data:
    driver: local
  output_data:
    driver: local
  whisper_cache:
    driver: local
  # redis_data:
  #   driver: local

# ---------------------------------------------------------- #
# Networks
# ---------------------------------------------------------- #
networks:
  default:
    name: transcription-network
